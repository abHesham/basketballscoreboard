<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3>HOME</h3>
                <div id="counter_home">0</div>
                <button class="addition_home" onclick="add1_home()">+1</button>
                <button class="addition_home" onclick="add2_home()">+2</button>
                <button class="addition_home" onclick="add3_home()">+3</button>
            </div>
            <div>
                <h3>GUEST</h3>
                <div id="counter_guest">0</div>
                <button class="addition_guest" onclick="add1_guest()">+1</button>
                <button class="addition_guest" onclick="add2_guest()">+2</button>
                <button class="addition_guest" onclick="add3_guest()">+3</button>
            </div>
        </div>
        <button id="newgame" onclick="resetCounter()">New Game</button>
        <script src="index.js"></script>
    </body>
</html>
